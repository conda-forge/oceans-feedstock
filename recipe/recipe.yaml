schema_version: 1

context:
  python_min: "3.11"
  version: "1.3.0"

package:
  name: oceans
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/oceans/oceans-${{ version }}.tar.gz
  sha256: 31c6bd2503f5ab4e81684af660fffb4555adf3a3a83dcf865756ad1449cddfa7

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - setuptools-scm >=3.4
    - pip
  run:
    - python >=${{ python_min }}
    - cf_xarray
    - cmcrameri
    - contourpy
    - gsw
    - matplotlib-base >=3.6.0
    - netcdf4
    - numpy >=1.20
    - pandas >=1.0.1
    - pooch
    - scipy
    - seawater
    - xarray

tests:
  - python:
      imports:
        - oceans
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Misc functions for oceanographic data analysis
  license: BSD-3-Clause
  license_file: LICENSE.txt
  homepage: https://pypi.org/project/oceans/

extra:
  recipe-maintainers:
    - ocefpaf
